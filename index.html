<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Dầu DO</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        h1 { color: #333; text-align: center; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;}
        .btn:hover { background-color: #218838; }
        .xuat-kho { color: red; font-weight: bold; }
        .nhap-kho { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Quản Lý Tồn Kho Dầu DO</h1>
    <button class="btn">+ Nhập Phiếu Mới</button>
    
    <table>
        <thead>
            <tr>
                <th>Mã Giao Dịch</th>
                <th>Ngày Tháng</th>
                <th>Loại Phiếu</th>
                <th>Số Lượng (Lít)</th>
                <th>Tồn Kho Hiện Tại</th>
                <th>Ghi Chú</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>NK001</td>
                <td>02/04/2026</td>
                <td class="nhap-kho">Nhập kho</td>
                <td>5,000</td>
                <td>15,000</td>
                <td>Nhập từ Nhà Cung Cấp A</td>
            </tr>
            <tr>
                <td>XK001</td>
                <td>01/04/2026</td>
                <td class="xuat-kho">Xuất kho</td>
                <td>2,000</td>
                <td>10,000</td>
                <td>Cấp cho xe tải BS 1234</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
