<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đề Nghị Cấp Dầu DO - DAIDUNG SHIPYARD</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #e9ecef; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-weight: 500; }
        .section-title { font-size: 1.1em; color: #1a73e8; border-bottom: 2px solid #e8eaed; padding-bottom: 8px; margin-top: 25px; margin-bottom: 15px; font-weight: bold; }
        .form-group { margin-bottom: 18px; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #495057; font-size: 0.95em; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 1em; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 5px rgba(26,115,232,0.2); }
        input[readonly] { background-color: #f8f9fa; color: #6c757d; cursor: not-allowed; }
        button { width: 100%; padding: 14px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #1a73e8; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛢️ HỆ THỐNG CẤP PHÁT DẦU DO</h2>
    <p class="subtitle">Kho Tổng - DAIDUNG SHIPYARD</p>

    <form id="requestForm">
        
        <div class="section-title">📌 1. THÔNG TIN BỘ PHẬN YÊU CẦU</div>
        <div class="form-group">
            <label for="boPhan">Sơ đồ tổ chức - Chọn tổ/bộ phận *</label>
            <select id="boPhan" required>
                <option value="">-- Vui lòng chọn bộ phận --</option>
                <option value="Kho Vũng Tàu">👥 KHO VŨNG TÀU</option>
                <option value="BP. Bảo Trì">🔧 BP. BẢO TRÌ</option>
                <option value="Đội Xe Xúc">🚜 ĐỘI XE XÚC</option>
                <option value="Đội Xe Tải">🚛 ĐỘI XE TẢI</option>
                <option value="CT Cầu Rạch Miễu">🏗️ CT CẦU RẠCH MIỄU</option>
                <option value="CT Đường Cao Tốc">🛣️ CT ĐƯỜNG CAO TỐC</option>
            </select>
        </div>

        <div class="row">
            <div class="col form-group">
                <label for="may">Mã máy / Tên thiết bị *</label>
                <input type="text" id="may" placeholder="VD: Xe xúc 01" required>
            </div>
            <div class="col form-group">
                <label for="nguoiNhan">Người nhận dầu *</label>
                <input type="text" id="nguoiNhan" placeholder="VD: L.T.Anh" required>
            </div>
        </div>

        <div class="section-title">📝 2. CHI TIẾT CẤP PHÁT</div>
        
        <div class="row">
            <div class="col form-group">
                <label for="soLuong">Số lượng (Lít) *</label>
                <input type="number" id="soLuong" placeholder="0" required min="1">
            </div>
            <div class="col form-group">
                <label for="nguoiCapPhat">Người cấp phát *</label>
                <input type="text" id="nguoiCapPhat" placeholder="Tên nhân viên kho" required>
            </div>
        </div>

        <div class="form-group">
            <label for="ngayTao">Thời gian cấp phát</label>
            <input type="text" id="ngayTao" readonly>
        </div>

        <div class="form-group">
            <label for="ghiChu">Ghi chú thêm</label>
            <textarea id="ghiChu" rows="2" placeholder="Nhập ghi chú (nếu có)..."></textarea>
        </div>

        <button type="submit" id="btnSubmit">🚀 Lưu Phiếu Xuất Dầu</button>
    </form>

    <a href="index.html" class="back-link">← Trở về màn hình Admin</a>
</div>

<script>
    window.onload = function() {
        const now = new Date();
        document.getElementById('ngayTao').value = now.toLocaleString('vi-VN');
    };

    document.getElementById('requestForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const btnSubmit = document.getElementById('btnSubmit');
        
        const data = {
            thoiGian: document.getElementById('ngayTao').value,
            boPhan: document.getElementById('boPhan').value,
            may: document.getElementById('may').value,
            nguoiNhan: document.getElementById('nguoiNhan').value,
            soLuong: document.getElementById('soLuong').value,
            nguoiCapPhat: document.getElementById('nguoiCapPhat').value,
            ghiChu: document.getElementById('ghiChu').value
        };

        btnSubmit.disabled = true;
        btnSubmit.innerText = "⏳ Đang lưu dữ liệu...";

        // ANH DÁN LINK GOOGLE SCRIPT CỦA ANH VÀO CHỖ CÓ CHỮ YOUR_GOOGLE_SCRIPT_URL_HERE BÊN DƯỚI NHÉ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbywD0N9FaSgE5ng5PrWw86ZbJso1B6etLDnI3u7NRpsruQe0RcsIdp-W7UvkwIK_i88uQ/exec'; 

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(data),
            headers: {
                "Content-Type": "text/plain;charset=utf-8",
            }
        })
        .then(response => response.json())
        .then(result => {
            if(result.status === 'success') {
                alert("✅ Đã lưu phiếu cấp phát thành công vào hệ thống!");
                window.location.href = "index.html"; 
            } else {
                alert("❌ Có lỗi xảy ra. Vui lòng thử lại!");
                btnSubmit.disabled = false;
                btnSubmit.innerText = "🚀 Lưu Phiếu Xuất Dầu";
            }
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert("❌ Lỗi kết nối. Vui lòng kiểm tra lại mạng!");
            btnSubmit.disabled = false;
            btnSubmit.innerText = "🚀 Lưu Phiếu Xuất Dầu";
        });
    });
</script>

</body>
</html>
